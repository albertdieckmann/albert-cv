name: Opdater Roskilde line-up

on:
  schedule:
    # Kører to gange dagligt: 07:00 og 19:00 UTC
    - cron: "0 7 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch: # Kan også køres manuelt fra GitHub Actions-fanen

permissions:
  contents: write

jobs:
  update-lineup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hent line-up fra Roskilde Festival
        run: python3 scripts/roskilde/build_lineup_data.py

      - name: Kopiér output til public-mappen
        run: |
          mkdir -p public/roskilde
          cp output/lineup_data.json public/roskilde/lineup.json

      - name: Commit og push hvis der er ændringer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet public/roskilde/lineup.json; then
            echo "Ingen ændringer i line-up data — springer commit over."
          else
            ANTAL=$(python3 -c "import json; d=json.load(open('public/roskilde/lineup.json')); print(len(d['items']))")
            git add public/roskilde/lineup.json
            git commit -m "Auto-opdater Roskilde line-up ($ANTAL acts)"
            git push
          fi
