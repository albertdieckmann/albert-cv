paragraph1: "Jeg startede min karriere i kommunikation og markedsføring – men det varede ikke længe inden IT trak mig ind. Det viser sig at organisationer, processer og teknologi er mere interessant end at skrive pressemeddelelser."
paragraph2: "I dag leder jeg DR's GenAI-team, hvor vi arbejder med at omsætte kunstig intelligens til noget der rent faktisk giver mening i en medievirksomhed. Inden da har jeg brugt år på at lære offentlige organisationer op i agil leverance – primært i Skatteforvaltningen."
paragraph3: "Jeg er mest glad når der er en klar retning, et engageret team og kaffe inden standup."
